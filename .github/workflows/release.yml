name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Detect projects
        id: projects
        run: |
          if compgen -G "src/**/*.csproj" > /dev/null; then
            echo "has_projects=true" >> $GITHUB_OUTPUT
          else
            echo "has_projects=false" >> $GITHUB_OUTPUT
            echo "::notice::No src/ projects to pack — release will be tag-only (no NuGet artifacts)."
          fi

      - name: Restore
        if: steps.projects.outputs.has_projects == 'true'
        run: dotnet restore

      - name: Build
        if: steps.projects.outputs.has_projects == 'true'
        run: dotnet build --configuration Release --no-restore

      - name: Test
        if: steps.projects.outputs.has_projects == 'true'
        run: dotnet test --configuration Release --no-build

      - name: Pack
        if: steps.projects.outputs.has_projects == 'true'
        run: dotnet pack --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Push to nuget.org
        if: steps.projects.outputs.has_projects == 'true'
        run: dotnet nuget push "./artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Create GitHub Release (with NuGet artifacts)
        if: steps.projects.outputs.has_projects == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*.nupkg

      - name: Create GitHub Release (tag-only, no artifacts)
        if: steps.projects.outputs.has_projects != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
